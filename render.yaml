# render.yaml — DealMate Blueprint
# Deploy all 4 services to Render in one click.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── 1. Backend (Node.js / Express) ─────────────────────────────────────────
  - type: web
    name: dealmate-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SALT_ROUNDS
        value: "10"
      - key: FRONTEND_URL
        sync: false          # Your frontend Render URL, e.g. https://dealmate-frontend.onrender.com
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: KHALTI_SECRET_KEY
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "465"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: CLOUD_API_KEY
        sync: false
      - key: CLOUD_API_SECRET
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: RECOMMENDER_SERVICE_URL
        sync: false          # URL of dealmate-recommend service below
      - key: SENTIMENT_SERVICE_URL
        sync: false          # URL of dealmate-sentiment service below

  # ── 2. Frontend (React Static Site) ────────────────────────────────────────
  - type: web
    name: dealmate-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # SPA fallback for React Router
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # Your backend Render URL + /api, e.g. https://dealmate-backend.onrender.com/api
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false
      - key: REACT_APP_STRIPE_PUBLIC_KEY
        sync: false
      - key: REACT_APP_KHALTI_PUBLIC_KEY
        sync: false

  # ── 3. AI Sentiment Service (Python / Flask) ────────────────────────────────
  - type: web
    name: dealmate-sentiment
    runtime: python
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn sentiment:app --bind 0.0.0.0:5001 --workers 2
    plan: free
    envVars:
      - key: SENTIMENT_PORT
        value: "5001"

  # ── 4. AI Recommendation Service (Python / Flask) ───────────────────────────
  - type: web
    name: dealmate-recommend
    runtime: python
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn recommend:app --bind 0.0.0.0:5002 --workers 2
    plan: free
    envVars:
      - key: RECOMMENDER_PORT
        value: "5002"
